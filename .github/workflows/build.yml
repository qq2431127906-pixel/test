name: Build and Release

on:
  push:
    tags:
      - 'v*'               # 推送 v1.0.0 等 tag 时触发
  workflow_dispatch:        # 允许手动触发
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF#refs/tags/v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo $V > version.txt

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 打包
        shell: powershell
        run: |
          pyinstaller --onedir --name "学术论文辅助写作" `
            --add-data "app.py;." `
            --add-data "literature_module.py;." `
            --add-data "outline_module.py;." `
            --add-data "polish_module.py;." `
            --add-data "plagiarism_module.py;." `
            --add-data "format_module.py;." `
            --add-data "formula_module.py;." `
            --add-data "shared_utils.py;." `
            --add-data "ui_theme.py;." `
            --add-data "prompt_templates.py;." `
            --add-data "version.txt;." `
            --add-data "paste_image_component;paste_image_component" `
            --add-data "drawing_component;drawing_component" `
            --add-data ".env.example;." `
            --console `
            run.py

      - name: 安装 NSIS
        shell: powershell
        run: choco install nsis -y

      - name: 构建安装包
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          # 替换 installer.nsi 中的版本号
          (Get-Content installer.nsi) -replace '!define VERSION ".*"', "!define VERSION `"$version`"" | Set-Content installer.nsi
          makensis installer.nsi
          ls *.exe

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          files: "学术论文辅助写作智能体_Setup_v*.exe"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
