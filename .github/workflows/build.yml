name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置版本号
        id: version
        shell: bash
        run: |
          V="${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}"
          V="${V#v}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "$V" > version.txt

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 打包
        shell: cmd
        run: |
          pyinstaller --onedir --name "assistant" ^
            --add-data "app.py;." ^
            --add-data "literature_module.py;." ^
            --add-data "outline_module.py;." ^
            --add-data "polish_module.py;." ^
            --add-data "plagiarism_module.py;." ^
            --add-data "format_module.py;." ^
            --add-data "formula_module.py;." ^
            --add-data "shared_utils.py;." ^
            --add-data "ui_theme.py;." ^
            --add-data "prompt_templates.py;." ^
            --add-data "version.txt;." ^
            --add-data "paste_image_component;paste_image_component" ^
            --add-data "drawing_component;drawing_component" ^
            --add-data ".env.example;." ^
            --console ^
            run.py

      - name: 写使用说明
        run: python write_readme.py "${{ steps.version.outputs.version }}" "dist\\assistant"

      - name: 用 iexpress 打包自解压 exe
        shell: cmd
        run: python make_self_extract.py "${{ steps.version.outputs.version }}" "dist\\assistant"

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          files: |
            学术论文辅助写作智能体_Setup_v*.exe
            学术论文辅助写作_v*.zip
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
