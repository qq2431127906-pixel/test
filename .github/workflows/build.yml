name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        shell: bash
        run: |
          V="${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}"
          V="${V#v}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "$V" > version.txt

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller 打包
        shell: cmd
        run: |
          pyinstaller --onedir --name "AcademicWritingAssistant" ^
            --add-data "app.py;." ^
            --add-data "literature_module.py;." ^
            --add-data "outline_module.py;." ^
            --add-data "polish_module.py;." ^
            --add-data "plagiarism_module.py;." ^
            --add-data "format_module.py;." ^
            --add-data "formula_module.py;." ^
            --add-data "shared_utils.py;." ^
            --add-data "ui_theme.py;." ^
            --add-data "prompt_templates.py;." ^
            --add-data "version.txt;." ^
            --add-data "paste_image_component;paste_image_component" ^
            --add-data "drawing_component;drawing_component" ^
            --add-data ".env.example;." ^
            --console ^
            run.py
          dir dist\AcademicWritingAssistant\run.exe

      - name: 打包为 ZIP 安装包
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $name = "学术论文辅助写作_v${version}"
          $src = "dist\AcademicWritingAssistant"

          # 创建用户 README
          @"
          学术论文辅助写作智能体 v${version}

          【使用方法】
          1. 双击 run.exe 启动
          2. 首次运行会自动创建 .env 文件，用记事本填写 DashScope API Key
          3. API Key 获取：https://dashscope.console.aliyun.com/apiKey
          4. 浏览器自动打开 http://127.0.0.1:8501

          【关闭方法】
          关闭 run.exe 的命令行窗口即可停止服务

          【注意事项】
          - 查重分析为语义判断，非正式查重
          - 首次文献模块运行需下载约 400MB 模型
          "@ | Out-File -FilePath "$src\使用说明.txt" -Encoding UTF8

          # 打包 ZIP
          Compress-Archive -Path "$src\*" -DestinationPath "${name}.zip" -Force
          Write-Host "Created: ${name}.zip"
          Get-ChildItem *.zip

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "v${{ steps.version.outputs.version }}"
          files: "学术论文辅助写作_v*.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
