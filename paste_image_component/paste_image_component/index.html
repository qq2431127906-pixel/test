<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: transparent;
    }

    .paste-zone {
      min-height: 172px;
      border: 2px dashed rgba(139,158,255,0.45);
      border-radius: 16px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
      outline: none;
      cursor: pointer;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    .paste-zone:focus,
    .paste-zone:hover {
      border-color: rgba(91,111,255,0.7);
      background: rgba(255,255,255,0.35);
      box-shadow: 0 4px 20px rgba(91,111,255,0.12);
    }

    .title {
      color: #5b6fff;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .hint {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.55;
    }

    .preview {
      display: none;
      width: 100%;
      gap: 12px;
      align-items: center;
      text-align: left;
    }

    .preview img {
      max-width: 152px;
      max-height: 132px;
      object-fit: contain;
      border: 1px solid rgba(139,158,255,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.6);
    }

    .ok {
      color: #5b6fff;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .meta {
      color: #6b7280;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-all;
    }

    .error {
      margin-top: 8px;
      color: #ef4444;
      font-size: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div id="pasteZone" class="paste-zone" tabindex="0">
    <div id="emptyState">
      <div class="title">点击这里，然后按 Ctrl+V 粘贴截图</div>
      <div class="hint">支持 Win+Shift+S 截图后的剪贴板图片；也可以直接拖入 PNG/JPG 图片。</div>
      <div id="errorText" class="error"></div>
    </div>
    <div id="previewState" class="preview">
      <img id="previewImage" alt="已粘贴的截图预览" />
      <div>
        <div class="ok">已读取剪贴板图片</div>
        <div id="imageMeta" class="meta"></div>
        <div class="hint">如需更换图片，再次点击此处粘贴新的截图。</div>
      </div>
    </div>
  </div>

  <script>
    const zone = document.getElementById("pasteZone");
    const emptyState = document.getElementById("emptyState");
    const previewState = document.getElementById("previewState");
    const previewImage = document.getElementById("previewImage");
    const imageMeta = document.getElementById("imageMeta");
    const errorText = document.getElementById("errorText");

    function sendStreamlitMessage(type, data) {
      window.parent.postMessage(
        {
          isStreamlitMessage: true,
          type,
          ...data,
        },
        "*"
      );
    }

    function setComponentReady() {
      sendStreamlitMessage("streamlit:componentReady", { apiVersion: 1 });
    }

    function setFrameHeight() {
      const height = Math.max(document.body.scrollHeight, 190);
      sendStreamlitMessage("streamlit:setFrameHeight", { height });
    }

    function setComponentValue(value) {
      sendStreamlitMessage("streamlit:setComponentValue", {
        value,
        dataType: "json",
      });
    }

    function showError(message) {
      errorText.textContent = message;
      setFrameHeight();
    }

    function handleImageFile(file) {
      if (!file || !file.type.startsWith("image/")) {
        showError("剪贴板里没有图片，请先用 Win+Shift+S 截图。");
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        emptyState.style.display = "none";
        previewState.style.display = "flex";
        previewImage.src = dataUrl;
        imageMeta.textContent = `${file.name || "clipboard-image"} · ${file.type || "image/png"} · ${Math.round(file.size / 1024)} KB`;
        setComponentValue({
          dataUrl,
          name: file.name || `clipboard-${Date.now()}.png`,
          mimeType: file.type || "image/png",
          size: file.size,
          updatedAt: Date.now(),
        });
        setFrameHeight();
      };
      reader.onerror = () => showError("图片读取失败，请重新截图后再粘贴。");
      reader.readAsDataURL(file);
    }

    function findImageFromItems(items) {
      for (const item of items) {
        if (item.kind === "file" && item.type.startsWith("image/")) {
          return item.getAsFile();
        }
      }
      return null;
    }

    zone.addEventListener("click", () => zone.focus());

    zone.addEventListener("paste", (event) => {
      event.preventDefault();
      const items = event.clipboardData ? event.clipboardData.items : [];
      handleImageFile(findImageFromItems(items));
    });

    zone.addEventListener("dragover", (event) => {
      event.preventDefault();
      zone.focus();
    });

    zone.addEventListener("drop", (event) => {
      event.preventDefault();
      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      handleImageFile(file);
    });

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "streamlit:render") {
        setFrameHeight();
      }
    });

    setComponentReady();
    setFrameHeight();
    zone.focus();
  </script>
</body>
</html>
